name: Java CI with Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: opinai
          POSTGRES_USER: opinai_user
          POSTGRES_PASSWORD: opinai_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Fix Maven Wrapper Permissions
      run: chmod +x backend/mvnw

    - name: Run Maven Build and Verify
      run: |
        cd backend
        ./mvnw clean verify -Dspring.datasource.url=jdbc:postgresql://localhost:5433/opinai -Dspring.datasource.username=opinai_user -Dspring.datasource.password=opinai_password
