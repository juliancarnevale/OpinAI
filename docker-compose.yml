services:
  postgres:
    image: postgres:16-alpine
    container_name: opinai-postgres
    environment:
      POSTGRES_DB: opinai
      POSTGRES_USER: opinai_user
      POSTGRES_PASSWORD: opinai_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opinai_user -d opinai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opinai-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/opinai
      - SPRING_DATASOURCE_USERNAME=opinai_user
      - SPRING_DATASOURCE_PASSWORD=opinai_password
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - GEMINI_API_KEY=dummy_gemini_api_key_for_testing
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 25s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
